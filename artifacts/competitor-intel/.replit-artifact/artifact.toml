kind = "web"
previewPath = "/"
title = "Competitor Intelligence Agent"
version = "1.0.0"
id = "artifacts/competitor-intel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25356

[services.development]
run = "pnpm --filter @workspace/competitor-intel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/competitor-intel", "run", "build" ]
publicDir = "artifacts/competitor-intel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25356"
BASE_PATH = "/"
