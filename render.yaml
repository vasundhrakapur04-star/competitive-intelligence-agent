services:
  # ── Backend API server ──────────────────────────────────────────────
  - type: web
    name: competitive-intel-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && pnpm install && pnpm -r --if-present run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false # set manually in Render dashboard
      - key: TAVILY_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

# ── Frontend static site ────────────────────────────────────────────
staticSites:
  - name: competitive-intel-dashboard
    buildCommand: corepack enable && pnpm install && pnpm -r --if-present run build
    staticPublishPath: artifacts/competitor-intel/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        sync: false # set to the backend URL, e.g. https://competitive-intel-api.onrender.com
