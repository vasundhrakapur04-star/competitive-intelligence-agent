services:
  # ── Backend API server ──────────────────────────────────────────────
  - type: web
    name: competitive-intel-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && pnpm install && pnpm -r --if-present run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false # set manually in Render dashboard
      - key: TAVILY_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

  # ── Frontend (served via npx serve) ──────────────────────────────────
  - type: web
    name: competitive-intel-dashboard
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && pnpm install && pnpm -r --if-present run build
    startCommand: npx serve artifacts/competitor-intel/dist/public -s -l tcp://0.0.0.0:$PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        sync: false # set to the backend URL, e.g. https://competitive-intel-api.onrender.com
